services:
  - type: web
    name: rivalscope
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATAFORSEO_EMAIL
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
